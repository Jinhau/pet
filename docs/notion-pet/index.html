<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>電子寵物小夥伴</title>
    <style>
      :root {
        --bg: #efe7d7;
        --ink: #24303d;
        --muted: #607081;
        --card: rgba(255, 251, 244, 0.93);
        --card-2: rgba(255, 247, 234, 0.96);
        --line: rgba(36, 48, 61, 0.1);
        --accent: #2d7d62;
        --accent-soft: rgba(45, 125, 98, 0.14);
        --shadow: 0 26px 60px rgba(49, 58, 71, 0.16);
        --shape-fill: #f4e9cf;
        --shape-shadow: rgba(95, 78, 35, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        color: var(--ink);
        font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.82), transparent 30%),
          radial-gradient(circle at bottom right, rgba(214, 236, 217, 0.9), transparent 28%),
          linear-gradient(155deg, #f2eadb 0%, #f4efe6 46%, #e7f0df 100%);
      }

      body {
        display: grid;
        place-items: center;
        padding: 18px;
      }

      body.compact {
        padding: 0;
      }

      .frame {
        position: relative;
        width: min(100%, 430px);
        min-height: 690px;
      }

      body.compact .frame {
        width: 100%;
        min-height: 100vh;
      }

      .glow {
        position: absolute;
        inset: auto;
        border-radius: 999px;
        filter: blur(8px);
        opacity: 0.78;
        pointer-events: none;
      }

      .glow.one {
        top: 16px;
        right: -24px;
        width: 150px;
        height: 150px;
        background: rgba(255, 194, 108, 0.34);
      }

      .glow.two {
        left: -40px;
        bottom: 120px;
        width: 190px;
        height: 190px;
        background: rgba(123, 191, 153, 0.22);
      }

      .card {
        position: relative;
        z-index: 1;
        min-height: 690px;
        border-radius: 34px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.38);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.48), transparent 24%),
          var(--card);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
        display: flex;
        flex-direction: column;
      }

      body.compact .card {
        min-height: 100vh;
        border-radius: 0;
      }

      .top {
        padding: 24px 22px 8px;
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: flex-start;
      }

      .eyebrow {
        margin: 0 0 8px;
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--accent);
      }

      h1 {
        margin: 0;
        font-size: 31px;
        line-height: 1.05;
      }

      .lead {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.6;
      }

      .chip {
        flex-shrink: 0;
        border-radius: 999px;
        padding: 10px 14px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 13px;
        font-weight: 900;
      }

      .stage {
        margin: 10px 18px 0;
        padding: 18px;
        border-radius: 28px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(247, 241, 229, 0.95)),
          var(--card-2);
        border: 1px solid var(--line);
      }

      .pet-scene {
        position: relative;
        min-height: 246px;
        border-radius: 26px;
        background:
          radial-gradient(circle at 50% 8%, rgba(255, 255, 255, 0.86), transparent 36%),
          linear-gradient(180deg, #fbf7ef 0%, #efe8db 100%);
        overflow: hidden;
        display: grid;
        place-items: center;
      }

      .scene-stars {
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0.36;
        background-image:
          radial-gradient(circle, rgba(255, 193, 94, 0.85) 0 1.5px, transparent 1.5px),
          radial-gradient(circle, rgba(93, 148, 122, 0.65) 0 1.2px, transparent 1.2px);
        background-size: 120px 120px, 160px 160px;
        background-position: 16px 24px, 72px 50px;
      }

      .pet {
        position: relative;
        width: 210px;
        height: 180px;
        transform-origin: center bottom;
        animation: bob 3.3s ease-in-out infinite;
      }

      @keyframes bob {
        0%,
        100% {
          transform: translateY(0) rotate(0deg);
        }
        50% {
          transform: translateY(-6px) rotate(0.6deg);
        }
      }

      .pet .shadow {
        position: absolute;
        left: 50%;
        bottom: 8px;
        width: 116px;
        height: 18px;
        margin-left: -58px;
        border-radius: 999px;
        background: rgba(74, 63, 38, 0.12);
        filter: blur(4px);
      }

      .pet-shape {
        position: absolute;
        left: 50%;
        bottom: 24px;
        transform: translateX(-50%);
      }

      .pet-face {
        position: absolute;
        inset: 0;
      }

      .pet-face::before,
      .pet-face::after {
        content: "";
        position: absolute;
        top: 78px;
        width: 12px;
        height: 18px;
        border-radius: 999px;
        background: var(--ink);
      }

      .pet-face::before {
        left: 78px;
      }

      .pet-face::after {
        right: 78px;
      }

      .mouth {
        position: absolute;
        left: 50%;
        top: 100px;
        width: 26px;
        height: 14px;
        margin-left: -13px;
        border-bottom: 4px solid var(--ink);
        border-radius: 0 0 18px 18px;
      }

      .blush {
        position: absolute;
        top: 102px;
        width: 24px;
        height: 14px;
        border-radius: 999px;
        background: rgba(241, 138, 123, 0.25);
      }

      .blush.left {
        left: 52px;
      }

      .blush.right {
        right: 52px;
      }

      .pet[data-form="貓咪"] .pet-shape {
        width: 138px;
        height: 114px;
        border-radius: 48% 48% 44% 44%;
        background: var(--shape-fill);
        box-shadow: inset 0 -14px 0 rgba(255, 255, 255, 0.34), 0 14px 22px var(--shape-shadow);
      }

      .pet[data-form="貓咪"] .pet-shape::before,
      .pet[data-form="貓咪"] .pet-shape::after {
        content: "";
        position: absolute;
        top: -24px;
        width: 36px;
        height: 42px;
        background: var(--shape-fill);
        clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
      }

      .pet[data-form="貓咪"] .pet-shape::before {
        left: 12px;
        transform: rotate(-8deg);
      }

      .pet[data-form="貓咪"] .pet-shape::after {
        right: 12px;
        transform: rotate(8deg);
      }

      .pet[data-form="史萊姆"] .pet-shape {
        width: 144px;
        height: 110px;
        background: linear-gradient(180deg, rgba(255,255,255,0.4), transparent 28%), var(--shape-fill);
        border-radius: 46% 46% 38% 38% / 54% 54% 32% 32%;
        box-shadow: inset 0 -18px 0 rgba(255,255,255,0.22), 0 14px 22px var(--shape-shadow);
      }

      .pet[data-form="史萊姆"] .pet-shape::before {
        content: "";
        position: absolute;
        left: 50%;
        top: -18px;
        width: 50px;
        height: 34px;
        margin-left: -25px;
        border-radius: 50% 50% 18% 18%;
        background: var(--shape-fill);
      }

      .pet[data-form="狐狸"] .pet-shape {
        width: 142px;
        height: 116px;
        border-radius: 42% 42% 45% 45%;
        background: var(--shape-fill);
        box-shadow: inset 0 -16px 0 rgba(255,255,255,0.25), 0 14px 22px var(--shape-shadow);
      }

      .pet[data-form="狐狸"] .pet-shape::before,
      .pet[data-form="狐狸"] .pet-shape::after {
        content: "";
        position: absolute;
        top: -28px;
        width: 40px;
        height: 46px;
        background: linear-gradient(180deg, var(--shape-fill), #e79f63);
        clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
      }

      .pet[data-form="狐狸"] .pet-shape::before {
        left: 10px;
        transform: rotate(-10deg);
      }

      .pet[data-form="狐狸"] .pet-shape::after {
        right: 10px;
        transform: rotate(10deg);
      }

      .pet[data-form="麻糬"] .pet-shape {
        width: 150px;
        height: 104px;
        border-radius: 48px;
        background: var(--shape-fill);
        box-shadow: inset 0 -12px 0 rgba(255,255,255,0.22), 0 14px 22px var(--shape-shadow);
      }

      .pet[data-form="麻糬"] .pet-shape::before,
      .pet[data-form="麻糬"] .pet-shape::after {
        content: "";
        position: absolute;
        top: -8px;
        width: 34px;
        height: 24px;
        border-radius: 999px 999px 14px 14px;
        background: rgba(255,255,255,0.42);
      }

      .pet[data-form="麻糬"] .pet-shape::before {
        left: 18px;
      }

      .pet[data-form="麻糬"] .pet-shape::after {
        right: 18px;
      }

      .pet-meta {
        display: flex;
        justify-content: space-between;
        gap: 14px;
        align-items: center;
        margin-top: 16px;
      }

      .name-wrap {
        flex: 1;
      }

      .pet-name {
        margin: 0;
        font-size: 30px;
        font-weight: 900;
      }

      .pet-sub {
        margin-top: 6px;
        color: var(--muted);
        font-size: 13px;
      }

      .form-chip {
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(36, 48, 61, 0.06);
        font-size: 13px;
        font-weight: 900;
      }

      .section {
        margin: 16px 18px 0;
        padding: 16px;
        border-radius: 22px;
        border: 1px solid var(--line);
        background: var(--card-2);
      }

      .section-title {
        margin: 0 0 12px;
        font-size: 14px;
        letter-spacing: 0.04em;
        font-weight: 900;
      }

      .note {
        margin: 0;
        line-height: 1.7;
        color: var(--ink);
      }

      .status-grid {
        display: grid;
        gap: 12px;
      }

      .status-row {
        display: grid;
        gap: 6px;
      }

      .status-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 13px;
      }

      .status-label {
        color: var(--muted);
      }

      .status-value {
        font-weight: 900;
      }

      .track {
        width: 100%;
        height: 12px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(36, 48, 61, 0.08);
      }

      .fill {
        height: 100%;
        border-radius: 999px;
        transition: width 220ms ease;
      }

      .toolbar {
        margin: 16px 18px 0;
        display: grid;
        gap: 12px;
      }

      .rename-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
      }

      .name-input {
        width: 100%;
        padding: 13px 14px;
        border-radius: 15px;
        border: 1px solid rgba(36, 48, 61, 0.12);
        background: rgba(255, 255, 255, 0.86);
        color: var(--ink);
        font-size: 15px;
      }

      .name-input:focus {
        outline: 2px solid rgba(45, 125, 98, 0.22);
        border-color: rgba(45, 125, 98, 0.3);
      }

      .form-switches,
      .action-grid {
        display: grid;
        gap: 10px;
      }

      .form-switches {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .action-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      button {
        appearance: none;
        border: 0;
        border-radius: 16px;
        padding: 12px 14px;
        font-size: 14px;
        font-weight: 900;
        cursor: pointer;
        transition: transform 140ms ease, box-shadow 140ms ease, opacity 140ms ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      button:active {
        transform: translateY(1px);
      }

      .primary {
        background: linear-gradient(135deg, #2d7d62, #54a67f);
        color: white;
        box-shadow: 0 10px 24px rgba(45, 125, 98, 0.24);
      }

      .secondary {
        background: rgba(36, 48, 61, 0.06);
        color: var(--ink);
      }

      .feed {
        background: linear-gradient(135deg, #ffd27d, #f1aa47);
        color: #543515;
      }

      .play {
        background: linear-gradient(135deg, #ffd2c5, #ee8571);
        color: #5f2720;
      }

      .rest {
        background: linear-gradient(135deg, #d7ddff, #95a9ff);
        color: #2c3d76;
      }

      .clean {
        background: linear-gradient(135deg, #d4f1eb, #7dc8bb);
        color: #215952;
      }

      .reset {
        background: linear-gradient(135deg, #f8ccd3, #ec93a0);
        color: #6f2b36;
      }

      .switch {
        background: rgba(255, 255, 255, 0.78);
        color: var(--ink);
        border: 1px solid rgba(36, 48, 61, 0.08);
      }

      .switch.active {
        background: linear-gradient(135deg, #24303d, #43586f);
        color: #fff;
      }

      .footer {
        margin: 16px 18px 18px;
        display: flex;
        justify-content: space-between;
        gap: 10px;
        color: var(--muted);
        font-size: 12px;
        align-items: center;
      }

      .footer code {
        font-family: Consolas, "Courier New", monospace;
        font-size: 11px;
      }

      body.compact .footer {
        display: none;
      }

      @media (max-width: 720px) {
        body {
          padding: 0;
        }

        .frame {
          width: 100%;
          min-height: 100vh;
        }

        .card {
          min-height: 100vh;
          border-radius: 0;
        }

        .form-switches {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <main class="frame">
      <div class="glow one"></div>
      <div class="glow two"></div>
      <section class="card">
        <header class="top">
          <div>
            <p class="eyebrow">Notion Embeddable Pet</p>
            <h1>電子寵物小夥伴</h1>
            <p class="lead">可以改名、切換型態，也會隨時間慢慢變化狀態，適合直接嵌進你的 Notion 首頁。</p>
          </div>
          <div class="chip" id="moodChip">開心</div>
        </header>

        <section class="stage">
          <div class="pet-scene">
            <div class="scene-stars"></div>
            <div class="pet" id="pet" data-form="貓咪">
              <div class="shadow"></div>
              <div class="pet-shape"></div>
              <div class="pet-face">
                <div class="blush left"></div>
                <div class="blush right"></div>
                <div class="mouth"></div>
              </div>
            </div>
          </div>

          <div class="pet-meta">
            <div class="name-wrap">
              <h2 class="pet-name" id="petName">小爪比</h2>
              <div class="pet-sub" id="petSub">年齡 0 小時，剛報到</div>
            </div>
            <div class="form-chip" id="formChip">型態：貓咪</div>
          </div>
        </section>

        <section class="section">
          <h3 class="section-title">今日碎念</h3>
          <p class="note" id="journalNote">牠剛剛伸了個懶腰，正準備陪你開始今天。</p>
        </section>

        <section class="section">
          <h3 class="section-title">狀態面板</h3>
          <div class="status-grid" id="statusGrid"></div>
        </section>

        <section class="toolbar">
          <div class="rename-row">
            <input class="name-input" id="nameInput" type="text" maxlength="20" placeholder="幫牠取個名字" />
            <button class="primary" id="renameButton" type="button">改名</button>
          </div>

          <div class="form-switches" id="formSwitches"></div>

          <div class="action-grid">
            <button class="feed" data-action="feed" type="button">餵食</button>
            <button class="play" data-action="play" type="button">玩耍</button>
            <button class="rest" data-action="rest" type="button">休息</button>
            <button class="clean" data-action="clean" type="button">清潔</button>
            <button class="secondary" data-action="status" type="button">看看牠</button>
            <button class="reset" data-action="reset" type="button">重新誕生</button>
          </div>
        </section>

        <footer class="footer">
          <span>支援 Notion Embed 與瀏覽器本機儲存</span>
          <code id="storageKey">storage: claw-code-notion-pet-v2</code>
        </footer>
      </section>
    </main>

    <script>
      const STORAGE_KEY = "claw-code-notion-pet-v2";
      const DEFAULT_NAME = "小爪比";
      const FORMS = ["貓咪", "史萊姆", "狐狸", "麻糬"];

      const ACTION_ALIASES = {
        feed: "feed",
        play: "play",
        rest: "rest",
        sleep: "rest",
        clean: "clean",
        wash: "clean",
        status: "status",
        reset: "reset",
        餵食: "feed",
        玩耍: "play",
        休息: "rest",
        睡覺: "rest",
        清潔: "clean",
        狀態: "status",
        重置: "reset",
      };

      const MOOD_LABELS = {
        curious: "好奇",
        grumpy: "不爽",
        happy: "開心",
        sleepy: "想睡",
        sparkly: "閃亮亮",
      };

      const ACTION_LABELS = {
        hatched: "剛誕生",
        fed: "剛吃飽",
        played: "剛玩過",
        rested: "剛睡醒",
        cleaned: "剛洗香香",
        status: "剛報到",
        reset: "重新誕生",
      };

      const STATUS_META = [
        { key: "fullness", label: "飽足感", color: "#f1aa47" },
        { key: "energy", label: "體力", color: "#8ea5ff" },
        { key: "joy", label: "心情值", color: "#ef7f6b" },
        { key: "hygiene", label: "整潔度", color: "#69c1aa" },
      ];

      const FORM_THEME = {
        貓咪: { fill: "#f1dfb3", shadow: "rgba(122, 94, 32, 0.12)" },
        史萊姆: { fill: "#bde9d4", shadow: "rgba(54, 114, 84, 0.12)" },
        狐狸: { fill: "#f2c394", shadow: "rgba(152, 90, 40, 0.14)" },
        麻糬: { fill: "#f6e4ea", shadow: "rgba(121, 79, 98, 0.12)" },
      };

      const NOTE_BY_MOOD = {
        curious: "牠歪著頭看你，像是在等你安排今天的任務。",
        grumpy: "牠嘟著嘴巴，可能想提醒你別忘了陪牠。",
        happy: "牠在原地晃來晃去，一副很想被稱讚的樣子。",
        sleepy: "牠揉揉眼睛，想找個舒服的角落窩一下。",
        sparkly: "牠今天閃閃發亮，完全是元氣滿滿模式。",
      };

      function nowIso() {
        return new Date().toISOString();
      }

      function clamp(value, lower = 0, upper = 100) {
        return Math.max(lower, Math.min(upper, value));
      }

      function parseDate(value) {
        const parsed = value ? new Date(value) : new Date();
        return Number.isNaN(parsed.getTime()) ? new Date() : parsed;
      }

      function createDefaultState(name = DEFAULT_NAME) {
        const now = nowIso();
        return {
          name,
          form: "貓咪",
          hunger: 35,
          energy: 72,
          joy: 64,
          hygiene: 76,
          lastAction: "hatched",
          hatchedAt: now,
          updatedAt: now,
        };
      }

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return createDefaultState();
          const parsed = JSON.parse(raw);
          return { ...createDefaultState(parsed.name || DEFAULT_NAME), ...parsed };
        } catch (_error) {
          return createDefaultState();
        }
      }

      function saveState(state) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function ageHours(state) {
        return Math.max(0, Math.floor((Date.now() - parseDate(state.hatchedAt).getTime()) / 3600000));
      }

      function decayState(state) {
        const current = new Date();
        const updatedAt = parseDate(state.updatedAt);
        const elapsedHours = Math.max(0, Math.floor((current.getTime() - updatedAt.getTime()) / 3600000));
        if (elapsedHours <= 0) return state;
        state.hunger = clamp(state.hunger + Math.floor(elapsedHours / 4) * 6);
        state.energy = clamp(state.energy - Math.floor(elapsedHours / 5) * 5);
        state.joy = clamp(state.joy - Math.floor(elapsedHours / 6) * 4);
        state.hygiene = clamp(state.hygiene - Math.floor(elapsedHours / 8) * 3);
        state.updatedAt = current.toISOString();
        return state;
      }

      function moodFor(state) {
        if (state.energy <= 20) return "sleepy";
        if (state.hunger >= 78 || state.hygiene <= 30) return "grumpy";
        if (state.joy >= 78 && state.energy >= 45) return "sparkly";
        if (state.joy >= 55) return "happy";
        return "curious";
      }

      function applyAction(state, action) {
        const normalized = ACTION_ALIASES[action] || ACTION_ALIASES[String(action).toLowerCase()];
        const pet = decayState(state);

        if (!normalized) {
          return { state: pet, event: "牠眨眨眼，看起來聽不懂這個指令。" };
        }

        if (normalized === "reset") {
          const fresh = createDefaultState(pet.name || DEFAULT_NAME);
          fresh.form = pet.form;
          Object.assign(pet, fresh);
          pet.lastAction = "reset";
          return { state: pet, event: `${pet.name} 重新誕生，而且還是喜歡現在這個型態。` };
        }

        if (normalized === "feed") {
          pet.hunger = clamp(pet.hunger - 26);
          pet.energy = clamp(pet.energy + 4);
          pet.joy = clamp(pet.joy + 6);
          pet.lastAction = "fed";
          pet.updatedAt = nowIso();
          return { state: pet, event: `你餵了 ${pet.name}，牠吃得心滿意足。` };
        }

        if (normalized === "play") {
          pet.joy = clamp(pet.joy + 18);
          pet.energy = clamp(pet.energy - 12);
          pet.hunger = clamp(pet.hunger + 10);
          pet.lastAction = "played";
          pet.updatedAt = nowIso();
          return { state: pet, event: `你陪 ${pet.name} 玩了一會，牠整隻都活起來了。` };
        }

        if (normalized === "rest") {
          pet.energy = clamp(pet.energy + 24);
          pet.hunger = clamp(pet.hunger + 8);
          pet.lastAction = "rested";
          pet.updatedAt = nowIso();
          return { state: pet, event: `${pet.name} 打了個盹，眼神柔和了不少。` };
        }

        if (normalized === "clean") {
          pet.hygiene = clamp(pet.hygiene + 28);
          pet.joy = clamp(pet.joy + 4);
          pet.lastAction = "cleaned";
          pet.updatedAt = nowIso();
          return { state: pet, event: `${pet.name} 現在乾乾淨淨，香香亮亮。` };
        }

        pet.lastAction = "status";
        pet.updatedAt = nowIso();
        return { state: pet, event: `${pet.name} 正在靜靜看著你，像是在等下一個指令。` };
      }

      function renamePet(state, nextName) {
        state.name = (nextName || "").trim() || DEFAULT_NAME;
        state.updatedAt = nowIso();
        return `${state.name} 已經記住自己的新名字了。`;
      }

      function changeForm(state, nextForm) {
        if (!FORMS.includes(nextForm)) return "牠保持原本的樣子。";
        state.form = nextForm;
        state.updatedAt = nowIso();
        return `${state.name} 現在切換成「${nextForm}」型態。`;
      }

      function buildStatusRows() {
        const target = document.getElementById("statusGrid");
        target.innerHTML = "";
        STATUS_META.forEach((item) => {
          const row = document.createElement("div");
          row.className = "status-row";
          row.innerHTML = `
            <div class="status-head">
              <span class="status-label">${item.label}</span>
              <span class="status-value" id="value-${item.key}">0%</span>
            </div>
            <div class="track">
              <div class="fill" id="fill-${item.key}" style="width:0%; background:${item.color};"></div>
            </div>
          `;
          target.appendChild(row);
        });
      }

      function buildFormSwitches() {
        const target = document.getElementById("formSwitches");
        target.innerHTML = "";
        FORMS.forEach((form) => {
          const button = document.createElement("button");
          button.className = "switch";
          button.type = "button";
          button.dataset.form = form;
          button.textContent = form;
          target.appendChild(button);
        });
      }

      function applyFormTheme(form) {
        const theme = FORM_THEME[form] || FORM_THEME["貓咪"];
        document.documentElement.style.setProperty("--shape-fill", theme.fill);
        document.documentElement.style.setProperty("--shape-shadow", theme.shadow);
      }

      function render(state, event) {
        const mood = moodFor(state);
        const fullness = clamp(100 - state.hunger);
        const values = {
          fullness,
          energy: state.energy,
          joy: state.joy,
          hygiene: state.hygiene,
        };

        applyFormTheme(state.form);
        document.getElementById("pet").dataset.form = state.form;
        document.getElementById("petName").textContent = state.name;
        document.getElementById("petSub").textContent = `年齡 ${ageHours(state)} 小時，${ACTION_LABELS[state.lastAction] || state.lastAction}`;
        document.getElementById("formChip").textContent = `型態：${state.form}`;
        document.getElementById("moodChip").textContent = MOOD_LABELS[mood];
        document.getElementById("journalNote").textContent = event || NOTE_BY_MOOD[mood];
        document.getElementById("nameInput").value = state.name;
        document.getElementById("storageKey").textContent = `storage: ${STORAGE_KEY}`;

        Object.entries(values).forEach(([key, value]) => {
          const fill = document.getElementById(`fill-${key}`);
          const label = document.getElementById(`value-${key}`);
          if (fill) fill.style.width = `${value}%`;
          if (label) label.textContent = `${value}%`;
        });

        document.querySelectorAll("[data-form]").forEach((button) => {
          button.classList.toggle("active", button.dataset.form === state.form);
        });
      }

      function readLayoutOptions() {
        const params = new URLSearchParams(window.location.search);
        if (params.get("compact") === "1") {
          document.body.classList.add("compact");
        }
      }

      function main() {
        readLayoutOptions();
        buildStatusRows();
        buildFormSwitches();

        let state = loadState();
        state = decayState(state);
        saveState(state);
        render(state, "牠剛剛伸了個懶腰，準備開始今天的陪伴。");

        document.querySelectorAll("[data-action]").forEach((button) => {
          button.addEventListener("click", () => {
            const result = applyAction(loadState(), button.dataset.action);
            saveState(result.state);
            render(result.state, result.event);
          });
        });

        document.getElementById("renameButton").addEventListener("click", () => {
          const current = loadState();
          const event = renamePet(current, document.getElementById("nameInput").value);
          saveState(current);
          render(current, event);
        });

        document.getElementById("formSwitches").addEventListener("click", (event) => {
          const target = event.target.closest("[data-form]");
          if (!target) return;
          const current = loadState();
          const note = changeForm(current, target.dataset.form);
          saveState(current);
          render(current, note);
        });

        window.addEventListener("storage", () => {
          const latest = loadState();
          render(latest, "狀態已經在另一個分頁更新。");
        });

        window.setInterval(() => {
          const latest = decayState(loadState());
          saveState(latest);
          render(latest, NOTE_BY_MOOD[moodFor(latest)]);
        }, 30000);
      }

      main();
    </script>
  </body>
</html>
