<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pet Pages</title>
    <meta http-equiv="refresh" content="0; url=./notion-pet/" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(160deg, #efe6d5 0%, #f4efe5 55%, #e5f0dc 100%);
        color: #24303d;
        font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      }

      main {
        max-width: 560px;
        padding: 32px;
        border-radius: 28px;
        background: rgba(255, 250, 242, 0.94);
        box-shadow: 0 22px 48px rgba(55, 61, 73, 0.16);
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 32px;
      }

      p {
        margin: 0 0 18px;
        line-height: 1.7;
        color: #4f5f71;
      }

      a {
        color: #2d7d62;
        font-weight: 800;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>電子寵物已準備好</h1>
      <p>如果沒有自動跳轉，請點下面這個連結打開 GitHub Pages 版電子寵物。</p>
      <a href="./notion-pet/">前往電子寵物頁面</a>
    </main>
  </body>
</html>
